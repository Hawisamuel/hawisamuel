<svg width="220" height="90" viewBox="0 0 220 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>

  <rect width="220" height="90" fill="#0D1117"/>

  <!-- pulsing cyan halo -->
  <rect x="20" y="20" width="180" height="50" rx="25" fill="#00D4FF" filter="url(#glow)" opacity="0.35">
    <animate attributeName="opacity" values="0.2;0.65;0.2" dur="2.4s" repeatCount="indefinite"/>
  </rect>

  <!-- rounded gradient border card -->
  <rect x="20" y="20" width="180" height="50" rx="25" fill="#0D1117" stroke="url(#borderGrad)" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
  </rect>

  <text x="110" y="50" text-anchor="middle" fill="#00E5FF" font-family="Verdana, Geneva, sans-serif" font-size="15" letter-spacing="1.5" font-weight="bold">👁 VIEWS</text>

  <!-- sparkle accents -->
  <circle cx="18" cy="25" r="2" fill="#00E5FF">
    <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="202" cy="65" r="2.5" fill="#00E5FF">
    <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
</svg>
